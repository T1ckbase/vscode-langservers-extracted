version: 2
updates:
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'monthly'

  - package-ecosystem: 'bun'
    directory: '/'
    schedule:
      interval: 'monthly'
    # Keep in sync with the TypeScript version in VS Code extensions
    ignore:
      - dependency-name: 'typescript'
