name: Extract and Publish to npm

on:
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * 2'

jobs:
  extract-and-publish:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: write
      id-token: write

    env:
      GIT_AUTHOR_NAME: github-actions[bot]
      GIT_AUTHOR_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com
      GIT_COMMITTER_NAME: github-actions[bot]
      GIT_COMMITTER_EMAIL: 41898282+github-actions[bot]@users.noreply.github.com

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node
        uses: actions/setup-node@v6
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check for updates and extract files
        id: extract
        run: |
          if bun ./script.mts; then
            echo "has_updates=true" >> $GITHUB_OUTPUT
          else
            status=$?
            if [ "$status" -eq 2 ]; then
              echo "has_updates=false" >> $GITHUB_OUTPUT
            else
              exit "$status"
            fi
          fi

      - name: Format
        if: steps.extract.outputs.has_updates == 'true'
        run: bunx oxfmt .

      - name: Run LSP smoke tests
        if: steps.extract.outputs.has_updates == 'true'
        run: bun test lsp.test.mts

      - name: Bump version and commit
        if: steps.extract.outputs.has_updates == 'true'
        run: |
          # Commit the package.json metadata changes
          git add package.json
          git commit -m "chore: update vscode language server versions"

          # Manually bump version in package.json
          npm version patch --no-git-tag-version

          # Commit the version bump
          NEW_VERSION=$(jq -r .version package.json)
          git add package.json
          git commit -m "chore: release v${NEW_VERSION}"
          git tag "v${NEW_VERSION}"

      - name: Publish to npm
        if: steps.extract.outputs.has_updates == 'true'
        run: npm publish --provenance

      - name: Push changes
        if: steps.extract.outputs.has_updates == 'true'
        run: git push --atomic origin HEAD:${{ github.ref_name }} --tags
