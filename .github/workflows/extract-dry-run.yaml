name: Extract Dry Run

on:
  workflow_dispatch:

jobs:
  extract-dry-run:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: 'lts/*'
          registry-url: 'https://registry.npmjs.org'

      - name: Set up Bun
        uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Extract files (dry run)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bun ./script.mts --force

      - name: Sync lockfile
        run: bun install

      - name: Run LSP smoke tests
        run: bun test lsp.test.mts

      - name: Check executable bits
        run: |
          for server in $(jq -r '.bin | values[]' package.json); do
            echo "Checking executable bit: $server"
            test -x "$server"
          done

      - name: Bump version (dry run)
        run: npm version patch --no-git-tag-version

      - name: Show changes
        run: |
          git status --short
          echo "---"
          git diff --stat

      - name: npm publish dry run
        run: npm publish --dry-run
